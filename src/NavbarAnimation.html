<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sliding Nav Bar</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            padding-top: 50px;
            background-color: #f4f4f4;
        }

        /* Container for the nav */
        .navbar {
            position: relative;
            display: flex;
            background: #fff;
            padding: 5px;
            border-radius: 50px; /* Rounded corners for the container */
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* The links */
        .nav-link {
            position: relative;
            z-index: 1; /* Keep text above the black slider */
            text-decoration: none;
            color: #333;
            padding: 12px 25px;
            font-weight: 600;
            font-size: 16px;
            transition: color 0.3s ease;
            cursor: pointer;
        }

        /* The moving black background */
        .slider {
            position: absolute;
            top: 5px; /* Match navbar padding */
            left: 0;
            height: calc(100% - 10px); /* Subtract top/bottom padding */
            background-color: black;
            border-radius: 40px; /* Rounded corners for the slider */
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55); /* Bouncy smooth effect */
            z-index: 0;
            
            /* Initial state (hidden or at first link) */
            width: 0; 
            opacity: 0;
        }

        /* Optional: Class to make text white when active */
        .nav-link.active {
            color: white;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <!-- The moving background element -->
        <div class="slider" id="slider"></div>

        <!-- The Links -->
        <a href="#" class="nav-link active" onclick="moveSlider(this)">Link A</a>
        <a href="#" class="nav-link" onclick="moveSlider(this)">Link B</a>
        <a href="#" class="nav-link" onclick="moveSlider(this)">Link C</a>
        <a href="#" class="nav-link" onclick="moveSlider(this)">Link D</a>
    </nav>

    <script>
        function moveSlider(element) {
            const slider = document.getElementById('slider');
            const links = document.querySelectorAll('.nav-link');

            // 1. Remove 'active' class from all links (to reset text color)
            links.forEach(link => link.classList.remove('active'));

            // 2. Add 'active' class to the clicked link
            element.classList.add('active');

            // 3. Calculate position and width
            // offsetLeft: distance from the left edge of the parent
            // offsetWidth: width of the element
            const left = element.offsetLeft;
            const width = element.offsetWidth;

            // 4. Apply styles to the slider
            slider.style.left = left + 'px';
            slider.style.width = width + 'px';
            
            // Make slider visible (in case it was hidden initially)
            slider.style.opacity = '1';
        }

        // Initialize the slider on the first active link when page loads
        window.onload = () => {
            const activeLink = document.querySelector('.nav-link.active');
            if(activeLink) {
                moveSlider(activeLink);
            }
        };
    </script>

</body>
</html>
